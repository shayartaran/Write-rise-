<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Write Rise Agency – Words That Work</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* - Your core variables and styles preserved */
  :root {
    --navy: #1a2744; --navy-deep: #0f1a30; --gold: #b8962e;
    --gold-light: #d4af5a; --cream: #faf8f3; --white: #ffffff;
    --text-muted: #7a8399;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Montserrat', sans-serif; background: var(--cream); color: var(--navy); overflow-x: hidden; }

  /* PROFESSIONAL BUTTON FIXES */
  .btn-link { text-decoration: none; display: inline-block; }
  button { cursor: pointer; border: none; font-family: 'Montserrat', sans-serif; text-transform: uppercase; transition: all .3s; }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 6%; background: rgba(250,248,243,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(184,150,46,0.15);
  }
  .nav-cta {
    background: var(--navy); color: var(--white); padding: 11px 26px;
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  .nav-cta:hover { background: var(--gold); }

  /* ── CONTACT FORM SECTION (NEW) ── */
  .contact-section { padding: 100px 6%; background: var(--white); display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
  .contact-form { background: var(--cream); padding: 40px; border: 1px solid rgba(184,150,46,0.1); }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 10px; font-weight: 700; margin-bottom: 8px; color: var(--gold); letter-spacing: 1px; }
  .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; font-family: 'Montserrat'; }

  /* ... [Your original styles for Hero, Marquee, and Services kept here] ... */
  .hero { min-height: 100vh; background: var(--navy-deep); display: flex; align-items: center; padding: 0 6%; color: white; position: relative; }
  .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(50px, 8vw, 90px); line-height: 1; }
  .hero h1 em { color: var(--gold-light); font-style: italic; }
  .btn-primary { background: var(--gold); color: var(--navy-deep); padding: 16px 40px; font-weight: 700; clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%); }
</style>
</head>
<body>

<nav id="navbar">
  <div class="logo-text" style="font-family:'Cormorant Garamond'; font-weight:700;">WRITE <span style="color:var(--gold)">RISE</span></div>
  <a href="#contact" class="btn-link"><button class="nav-cta">Get a Quote</button></a>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1>Words That<br><em>Elevate</em><br>Brands</h1>
    <p style="margin: 20px 0 40px; color: rgba(255,255,255,0.6);">Premium copywriting for industry leaders.</p>
    <div class="hero-actions">
      <a href="#contact" class="btn-link"><button class="btn-primary">Start a Project</button></a>
    </div>
  </div>
</section>

<section class="contact-section" id="contact">
  <div>
    <h2 style="font-family:'Cormorant Garamond'; font-size: 48px;">Ready to <em>Rise?</em></h2>
    <p style="margin: 20px 0; color: var(--text-muted);">Fill out the form or email us at <br><strong>hello@writerise.agency</strong></p>
  </div>
  <form class="contact-form">
    <div class="form-group">
      <label>NAME</label>
      <input type="text" placeholder="Your name">
    </div>
    <div class="form-group">
      <label>EMAIL</label>
      <input type="email" placeholder="Your email">
    </div>
    <div class="form-group">
      <label>MESSAGE</label>
      <textarea rows="4" placeholder="How can we help?"></textarea>
    </div>
    <button type="submit" class="btn-primary" style="width: 100%;">Send Message</button>
  </form>
</section>

<footer>
  <p style="text-align: center; padding: 40px; background: #080f1e; color: rgba(255,255,255,0.3); font-size: 12px;">
    © 2026 Write Rise Agency. All rights reserved.
  </p>
</footer>

</body>
</html>
